name: Build OpenWrt (N6005 Full)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'  # 每天自动编译（UTC时间）

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses-dev \
        libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

    - name: Clone Source
      run: |
        git clone https://github.com/immortalwrt/immortalwrt.git openwrt
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Add Packages (Full Combo)
      run: |
        cd openwrt/package
        git clone https://github.com/fw876/helloworld
        git clone https://github.com/xiaorouji/openwrt-passwall
        git clone https://github.com/xiaorouji/openwrt-passwall2
        git clone https://github.com/vernesong/OpenClash
        git clone https://github.com/nikkinikki-org/OpenWrt-nikki
        git clone https://github.com/morytyann/OpenWrt-momo

    - name: Load Config
      run: |
        cd openwrt
        cp ../.config .config
        make defconfig

    - name: Download Packages
      run: |
        cd openwrt
        make -j$(nproc) download

    - name: Compile
      run: |
        cd openwrt
        make -j$(nproc) V=s

    - name: Upload Firmware
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-n6005
        path: openwrt/bin/targets/
